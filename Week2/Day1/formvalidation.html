<!DOCTYPE html>
<html>
<head>
    <title>Registration Form Validation</title>
</head>
<body>

<h2>Registration Form</h2>

<!-- Name -->
<label>Name:</label><br>
<input type="text" id="name" onchange="validateName()">
<span id="nameMsg" style="color:red;"></span>
<br><br>

<!-- Email -->
<label>Email:</label><br>
<input type="text" id="email" onchange="validateEmail()">
<span id="emailMsg" style="color:red;"></span>
<br><br>

<!-- Age -->
<label>Age:</label><br>
<input type="number" id="age" onchange="validateAge()">
<span id="ageMsg" style="color:red;"></span>
<br><br>

<!-- Submit button -->
<button onclick="saveData()">Register</button>

<p id="finalMsg" style="color:green;"></p>

<script>
    // Name validation
    function validateName() {
        var name = document.getElementById("name").value;
        if (name === "") {
            document.getElementById("nameMsg").innerHTML = "Name cannot be empty";
        } else {
            document.getElementById("nameMsg").innerHTML = "";
        }
    }

    // Email validation
    function validateEmail() {
        var email = document.getElementById("email").value;
        if (email.includes("@")) {
            document.getElementById("emailMsg").innerHTML = "";
        } else {
            document.getElementById("emailMsg").innerHTML = "Email must contain @";
        }
    }

    // Age validation
    function validateAge() {
        var age = document.getElementById("age").value;
        if (age > 18) {
            document.getElementById("ageMsg").innerHTML = "";
        } else {
            document.getElementById("ageMsg").innerHTML = "Age must be greater than 18";
        }
    }

    // Save valid data in sessionStorage
    function saveData() {
        var name = document.getElementById("name").value;
        var email = document.getElementById("email").value;
        var age = document.getElementById("age").value;

        if (name !== "" && email.includes("@") && age > 18) {
            sessionStorage.setItem("userName", name);
            sessionStorage.setItem("userEmail", email);
            sessionStorage.setItem("userAge", age);

            document.getElementById("finalMsg").innerHTML = "Registration successful! Data saved.";
        } else {
            document.getElementById("finalMsg").innerHTML = "Please enter valid details.";
        }
    }
</script>

</body>
</html>
